<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            text-align:center;
            margin-top:100px;
        }

        .box{
            width:350px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
        }

        button{
            padding:10px 20px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Admin Login</h2>

    <form action="/login" method="post">
        <input type="text" name="username" placeholder="Enter Username" required><br>
        <input type="password" name="password" placeholder="Enter Password" required><br>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
