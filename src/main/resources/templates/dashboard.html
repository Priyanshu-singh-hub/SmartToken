<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
  <style>
    body{
        font-family: Arial;
        background: #f0f2f5;
        padding: 30px;
    }

    .container{
        width: 90%;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    h1{
        text-align: center;
        margin-bottom: 20px;
    }

    table{
        width: 100%;
        border-collapse: collapse;
    }

    th, td{
        padding: 14px;
        text-align: center;
        border-bottom: 1px solid #ddd;
    }

    th{
        background: #007bff;
        color: white;
    }

    a{
        text-decoration: none;
        padding: 6px 12px;
        border-radius: 5px;
        margin: 2px;
    }

    .edit{
        background: #28a745;
        color: white;
    }

    .delete{
        background: #dc3545;
        color: white;
    }
</style>
</head>
<body>

<div class="container">
<h1>Welcome Admin ❤️</h1>

<table>
    <tr>
        <th>Token ID</th>
        <th>Name</th>
        <th>Mobile</th>
        <th>Action</th>
    </tr>

    <tr th:each="token : ${tokens}">
        <td th:text="${token.id}"></td>
        <td th:text="${token.name}"></td>
        <td th:text="${token.mobile}"></td>
        <td>
            <a class="edit" th:href="@{/edit/{id}(id=${token.id})}">Edit</a>
			<a class="delete" th:href="@{/delete/{id}(id=${token.id})}">Delete</a>
        </td>
    </tr>
</table>
</div>

</body>
</html>
