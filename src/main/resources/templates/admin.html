<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <style>
        body{
            font-family: Arial;
            text-align:center;
            margin-top:50px;
            background:#f5f5f5;
        }

        table{
            margin:auto;
            width:70%;
            border-collapse:collapse;
            background:white;
        }

        th, td{
            border:1px solid black;
            padding:10px;
        }

        th{
            background:#007bff;
            color:white;
        }
    </style>
</head>
<body>

<h1>Booked Tokens List 🎟️</h1>

<table>
    <tr>
       
    <th>ID</th>
    <th>Name</th>
    <th>Mobile</th>
    <th>Token No</th>
    <th>Delete</th>
    <th>Edit</th>

    </tr>

  <tr th:each="token : ${tokens}">
    <td th:text="${token.id}"></td>
    <td th:text="${token.name}"></td>
    <td th:text="${token.mobile}"></td>
    <td th:text="${token.tokenNumber}"></td>

    <td>
       <a th:href="@{/delete/{id}(id=${token.id})}">
    <button>Delete</button>
</a>

<a th:href="@{/edit/{id}(id=${token.id})}">
    <button>Edit</button>
</a>
    </td>
</tr>
</table>

</body>
</html>
