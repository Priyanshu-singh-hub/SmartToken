<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Token Booked</title>
    <style>
        body{
            font-family: Arial;
            text-align:center;
            margin-top:100px;
            background:#f5f5f5;
        }

        .box{
            width:400px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            color:green;
        }

        .token{
            font-size:30px;
            font-weight:bold;
            color:blue;
        }
    </style>
</head>
<body style="text-align:center; font-family:Arial; margin-top:100px;">
    <h1>Token Booked Successfully ❤️</h1>
    <h2>Your Token Number: <span th:text="${tokenId}"></span></h2>
    <a href="/">Book Another Token</a>
</body>
</html>
